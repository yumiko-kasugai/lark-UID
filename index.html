<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<p id="status">読み込み中...</p>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  document.getElementById("status").textContent = "LIFF初期化中...";
  liff.init({ liffId: "2009864106-AVsDDK2z" })
    .then(() => {
      document.getElementById("status").textContent = "プロフィール取得中...";
      return liff.getProfile();
    })
    .then((profile) => {
      document.getElementById("status").textContent = "送信中: " + profile.userId;
      return fetch("https://hook.us2.make.com/ah67wbil9h9cfs2x8x6hb1osmvuhp6cf", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lineUid: profile.userId })
      });
    })
    .then(() => {
      document.getElementById("status").textContent = "受付完了！LINEをご確認ください。";
    })
    .catch((err) => {
      document.getElementById("status").textContent = "エラー: " + err.message;
    });
</script>
</body>
</html>
