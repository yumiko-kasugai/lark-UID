<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f8f0;
    font-family: sans-serif;
  }
  #status {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    color: #333;
    padding: 20px;
  }
</style>
</head>
<body>
<div id="status">読み込み中...</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  liff.init({ liffId: "2009864106-AVsDDK2z" })
    .then(() => liff.getProfile())
    .then((profile) => {
      return fetch("https://hook.us2.make.com/ah67wbil9h9cfs2x8x6hb1osmvuhp6cf", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lineUid: profile.userId, type: "reception" })
      });
    })
    .then(() => {
      document.getElementById("status").textContent = "受付完了！\nLINEをご確認ください";
    })
    .catch((err) => {
      document.getElementById("status").textContent = "エラー: " + err.message;
    });
</script>
</body>
</html>
